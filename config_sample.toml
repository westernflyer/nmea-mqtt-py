# Configuration file for nmea-logger-py
#
#    DO NOT EDIT THIS FILE!
#
#    Instead, copy it to config.toml, then edit that.
#

# Set to 1 for debug messages, set to 2 for even more messages
# This can be overridden with the NMEA_MQTT_DEBUG environment variable.
DEBUG = 0

# Vessel related
MMSI = 368323170

# NMEA socket configuration
[NMEA_OPTIONS]
NMEA_SOCKETS = [
    ["localhost", 10110],
    ["localhost", 10111],
]
NMEA_TIMEOUT = 30
NMEA_RETRY_WAIT = 60

# -----------------------------------------------------------------------------
# MQTT configuration.
# -----------------------------------------------------------------------------

[MQTT_OPTIONS]
MQTT_BROKER = "localhost"
MQTT_PORT = 1883
MQTT_TOPIC_PREFIX = "nmea"
MQTT_USERNAME = ""
MQTT_PASSWORD = ""

# How often to publish in milliseconds. If an address field is not listed below,
# it will not get published.
[MQTT_PUBLISH_INTERVALS]
# GPGGA = 10000  # Lat, lon plus quality indicators.
GPGLL = 10000    # Lat, lon
# GPRMC = 10000  # Lat, lon, SOG, COG
GPVTG = 10000    # COG & SOG
HEHDT = 10000    # Heading - True
IIMDA = 10000    # Met data. Baro, temperature, true wind
IIRSA = 10000    # Rudder Sensor Angle
SDDPT = 10000    # Depth of water
TIROT = 10000    # Rate of turn
WIMWV = 10000    # Relative wind speed and angle - Airmar
FTMWV = 10000    # Relative wind speed and angle - FT602

# -----------------------------------------------------------------------------
# DuckDB configuration.
# -----------------------------------------------------------------------------

[DUCKDB]

# Path to the DuckDB database (env: DUCKDB_DATABASE_PATH)
# Default: "nmea_database.db"
# DATABASE_PATH = "nmea_database.db"

# Batch sizes for writes to the database
# Default: 600
# BATCH_SIZE = 600

# Max batch interval before writing to the database in seconds
# Default: 60
# BATCH_INTERVAL = 60
